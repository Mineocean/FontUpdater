name: Build and Release

on:
  push:
    tags: [ 'v*' ]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Setup NuGet
      uses: nuget/setup-nuget@v2

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore NuGet packages
      run: nuget restore FontManager/FontManager.csproj -PackagesDirectory FontManager/packages

    - name: Build
      run: msbuild FontManager/FontManager.csproj /p:Configuration=Release /p:Platform=AnyCPU

    - name: Install ILMerge
      run: nuget install ILMerge -OutputDirectory tools

    - name: Merge into single exe
      run: |
        $ilmerge = (Get-ChildItem -Path "tools" -Recurse -Filter "ilmerge.exe" | Select-Object -First 1).FullName
        $targetPlatform = "/targetplatform:v4,C:\Program Files (x86)\Reference Assemblies\Microsoft\Framework\.NETFramework\v4.7.2"
        & $ilmerge /out:FontManager.exe FontManager/bin/Release/FontManager.exe FontManager/bin/Release/Newtonsoft.Json.dll /target:winexe $targetPlatform

    - name: Upload single exe
      uses: actions/upload-artifact@v4
      with:
        name: FontManager
        path: FontManager.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: FontManager

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: FontManager.exe
        generate_release_notes: true
