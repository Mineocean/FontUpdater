name: Build and Release

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup NuGet
      uses: nuget/setup-nuget@v2

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore NuGet packages
      run: nuget restore FontManager/FontManager.csproj -PackagesDirectory FontManager/packages

    - name: Build
      run: msbuild FontManager/FontManager.csproj /p:Configuration=Release /p:Platform=AnyCPU

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: FontManager
        path: FontManager/bin/Release/

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: FontManager
        path: release/

    - name: Create ZIP
      run: cd release && zip -r ../FontManager-${{ github.ref_name }}.zip .

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: FontManager-${{ github.ref_name }}.zip
        generate_release_notes: true
